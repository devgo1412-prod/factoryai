# =============================================
# nginx.conf  —  서버 C 배치 경로: C:\nginx\conf\nginx.conf
# =============================================
# 수정 필요 항목:
#   <서버C_IP>  → 서버 C의 실제 IP (예: 192.168.1.30)
#   <서버B_IP>  → 서버 B의 실제 IP (예: 192.168.1.20)

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 업로드/응답 크기 제한 (LLM 응답이 길 수 있으므로 여유 있게)
    client_max_body_size 50M;
    proxy_read_timeout   180s;
    proxy_send_timeout   180s;

    # 로그
    access_log  logs/access.log;
    error_log   logs/error.log;

    server {
        listen       80;
        server_name  <서버C_IP>;

        # ── React 정적 파일 서빙 ──────────────────
        root   C:/factory_app/frontend/dist;
        index  index.html;

        location / {
            # SPA 라우팅 — 새로고침해도 index.html 반환
            try_files $uri $uri/ /index.html;
        }

        # ── FastAPI 리버스 프록시 ─────────────────
        location /api/ {
            proxy_pass         http://<서버B_IP>:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 180s;
        }

        # ── 정적 자산 캐시 ────────────────────────
        location ~* \.(js|css|png|jpg|ico|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── 404 → SPA fallback ────────────────────
        error_page 404 /index.html;
    }
}
